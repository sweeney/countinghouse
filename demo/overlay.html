<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countinghouse — power + state overlay</title>
<!-- Chart.js + date adapter (time axis) + annotation plugin. All CDN, no build. -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  :root { --bg:#0f1220; --panel:#191d2e; --ink:#e7e9f3; --muted:#9aa0b8; --line:#2a3050; --accent:#5b8cff; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:20px 24px; border-bottom:1px solid var(--line); }
  h1 { margin:0 0 4px; font-size:20px; }
  .sub { color:var(--muted); font-size:13px; }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .controls { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; margin-bottom:18px; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  select, input, button { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; font-size:14px; }
  button { background:var(--accent); border-color:var(--accent); color:#fff; cursor:pointer; font-weight:600; }
  button.ghost { background:var(--panel); color:var(--ink); border-color:var(--line); font-weight:400; }
  button:hover { filter:brightness(1.08); }
  button:disabled { opacity:.7; cursor:default; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }
  .chartwrap { position:relative; height:420px; }
  .dd { position:relative; }
  .dd-panel { position:absolute; z-index:10; top:calc(100% + 4px); left:0; min-width:230px; max-height:280px; overflow:auto;
              background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px; display:none; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .dd-panel.open { display:block; }
  .dd-row { display:flex; align-items:center; gap:8px; padding:5px 6px; border-radius:6px; }
  .dd-row:hover { background:#0c0f1a; }
  .sw { width:12px; height:12px; border-radius:3px; flex:0 0 auto; }
  .refresh-wrap { display:flex; align-items:center; gap:10px; }
  .spinner { width:16px; height:16px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  .spinner[hidden] { display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .ovlegend { display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; font-size:13px; color:var(--muted); }
  .ovlegend .item { display:flex; align-items:center; gap:6px; }
  #err { color:#ff7a90; margin-top:10px; min-height:18px; font-size:13px; }
  .src { color:var(--muted); font-size:12px; margin-top:12px; }
  details { margin-top:16px; color:var(--muted); } summary { cursor:pointer; }
  details .field { margin-top:10px; max-width:680px; } details input { width:100%; }
</style>
  <!-- optional local dev token (gitignored): sets window.CH_DEV_TOKEN -->
  <script src="token.local.js"></script>
</head>
<body>
<header>
  <h1>Countinghouse — power with state overlay</h1>
  <div class="sub">A device's power on a time axis, with on/off state devices (hot water, heating,
    fire alarms) shaded as hatched "ON" bands from <code>/devices/{id}/intervals</code>.</div>
</header>

<main>
  <div class="controls">
    <div class="field">
      <label for="device">Power line (device)</label>
      <select id="device"></select>
    </div>
    <div class="field">
      <label>Overlay state devices</label>
      <div class="dd">
        <button class="ghost" id="ddBtn" type="button">Overlays ▾</button>
        <div class="dd-panel" id="ddPanel"></div>
      </div>
    </div>
    <div class="field">
      <label for="window">Window</label>
      <select id="window">
        <option value="today" selected>Today</option>
        <option value="week">This week</option>
        <option value="month">This month</option>
      </select>
    </div>
    <div class="field">
      <label for="interval">Interval</label>
      <select id="interval">
        <option value="">auto</option>
        <option value="5m">5m</option>
        <option value="15m" selected>15m</option>
        <option value="30m">30m</option>
        <option value="1h">1h</option>
      </select>
    </div>
    <div class="refresh-wrap">
      <button id="reload">Refresh</button>
      <span class="spinner" id="spin" hidden></span>
    </div>
  </div>

  <div class="panel">
    <div class="chartwrap"><canvas id="chart"></canvas></div>
    <div class="ovlegend" id="ovlegend"></div>
    <div id="err"></div>
    <div class="src" id="src"></div>
  </div>

  <details>
    <summary>Connection settings</summary>
    <div class="field"><label for="base">API base URL</label><input id="base" value="http://localhost:8081"></div>
    <div class="field">
      <label for="token">Bearer token (saved in this browser; expires ~15 min)</label>
      <input id="token" value="" spellcheck="false" placeholder="paste id.swee.net token">
    </div>
  </details>
</main>

<script>
const $ = (id) => document.getElementById(id);
const PALETTE = ['#ffb454','#ff7a90','#b18cff','#4cc9f0','#f15bb5','#9ad94b','#ff9f1c','#48cae4'];
{ const A = window['chartjs-plugin-annotation']; if (A) Chart.register(A.default ?? A); }

let chart;
let eventDevices = [];        // [{id,label}]
let overlaySel = new Set();   // selected overlay device ids

function base()  { return $('base').value.replace(/\/+$/, ''); }
function token() { return $('token').value.trim(); }

async function api(path) {
  const res = await fetch(base() + path, { headers: { Authorization: 'Bearer ' + token() } });
  if (!res.ok) throw new Error('HTTP ' + res.status + ' on ' + path + ' — ' + (await res.text()).slice(0, 200));
  return res.json();
}

// Diagonal-hatch CanvasPattern for the "ON" bands.
function hatch(stroke) {
  const c = document.createElement('canvas'); c.width = c.height = 8;
  const x = c.getContext('2d'); x.strokeStyle = stroke; x.lineWidth = 1.5;
  x.beginPath(); x.moveTo(0, 8); x.lineTo(8, 0); x.moveTo(-2, 2); x.lineTo(2, -2); x.moveTo(6, 10); x.lineTo(10, 6); x.stroke();
  return x.createPattern(c, 'repeat');
}
function rgba(hex, a) { const n = parseInt(hex.slice(1), 16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

function setLoading(on) {
  $('reload').disabled = on;
  $('reload').textContent = on ? 'Refreshing…' : 'Refresh';
  $('spin').hidden = !on;
}

async function loadDevices() {
  const data = await api('/devices');
  // Energy-capable → the power line picker.
  const sel = $('device'); sel.innerHTML = '';
  data.devices.filter(d => (d.capabilities || []).includes('energy')).forEach(d => {
    const o = document.createElement('option');
    o.value = d.id; o.textContent = (d.display_name || d.id) + ' · ' + d.location;
    if (d.id === 'winefridge') o.selected = true;
    sel.appendChild(o);
  });
  // Events-capable → the overlay tick-list.
  eventDevices = data.devices.filter(d => (d.capabilities || []).includes('events'))
    .map(d => ({ id: d.id, label: d.display_name || d.id }));
  overlaySel = new Set(eventDevices.filter(d => d.id === 'hot_water').map(d => d.id));
  if (overlaySel.size === 0 && eventDevices[0]) overlaySel.add(eventDevices[0].id);
  renderOverlayPicker();
}

function colorForOverlay(id) {
  const i = eventDevices.findIndex(d => d.id === id);
  return PALETTE[(i < 0 ? 0 : i) % PALETTE.length];
}

function renderOverlayPicker() {
  const p = $('ddPanel'); p.innerHTML = '';
  eventDevices.forEach(d => {
    const row = document.createElement('label'); row.className = 'dd-row';
    row.innerHTML = `<input type="checkbox" ${overlaySel.has(d.id) ? 'checked' : ''}>
      <span class="sw" style="background:${colorForOverlay(d.id)}"></span><span>${d.label}</span>`;
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) overlaySel.add(d.id); else overlaySel.delete(d.id);
      $('ddBtn').textContent = `Overlays (${overlaySel.size}/${eventDevices.length}) ▾`;
      load();
    });
    p.appendChild(row);
  });
  $('ddBtn').textContent = `Overlays (${overlaySel.size}/${eventDevices.length}) ▾`;
}

async function load() {
  $('err').textContent = '';
  const id = $('device').value, win = $('window').value, iv = $('interval').value;
  const seriesPath = '/devices/' + encodeURIComponent(id) + '/series?window=' + win + (iv ? '&interval=' + iv : '');
  const overlayIds = [...overlaySel];
  $('src').textContent = 'source: GET ' + seriesPath + '  +  /devices/{id}/intervals for: ' + (overlayIds.join(', ') || '—');

  setLoading(true);
  try {
    const [series, ...timelines] = await Promise.all([
      api(seriesPath),
      ...overlayIds.map(ev => api('/devices/' + encodeURIComponent(ev) + '/intervals?window=' + win)),
    ]);
    renderChart(id, series, overlayIds, timelines);
  } catch (e) {
    $('err').textContent = e.message;
  } finally {
    setLoading(false);
  }
}

function renderChart(id, series, overlayIds, timelines) {
  const s = (series.series && series.series[0]) || { avg_w: [], label: id };
  const points = series.buckets.map((t, i) => ({ x: new Date(t).valueOf(), y: s.avg_w[i] ?? 0 }));

  // One box annotation per ON interval of each selected overlay device.
  const annotations = {};
  const legend = $('ovlegend'); legend.innerHTML = '';
  overlayIds.forEach((ev, oi) => {
    const tl = timelines[oi];
    const col = colorForOverlay(ev);
    const dev = eventDevices.find(d => d.id === ev);
    (tl.intervals || []).forEach((iv, ii) => {
      const end = iv.end || tl.to; // open interval → extend to window end
      annotations[`${ev}-${ii}`] = {
        type: 'box',
        xMin: new Date(iv.start).valueOf(),
        xMax: new Date(end).valueOf(),
        backgroundColor: hatch(rgba(col, 0.85)),
        borderColor: rgba(col, 0.7), borderWidth: 1,
      };
    });
    const span = document.createElement('span'); span.className = 'item';
    span.innerHTML = `<span class="sw" style="background:${col}"></span>${dev ? dev.label : ev} ON`;
    legend.appendChild(span);
  });

  const cfg = {
    type: 'line',
    data: { datasets: [{
      label: (s.label || id) + ' — power (W)', data: points,
      borderColor: '#5b8cff', backgroundColor: 'rgba(91,140,255,.12)',
      fill: true, tension: .25, pointRadius: 0, borderWidth: 2,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false, parsing: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { type: 'time', time: { tooltipFormat: 'HH:mm' }, ticks: { color: '#9aa0b8' }, grid: { color: '#222842' } },
        y: { beginAtZero: true, title: { display: true, text: 'Power (W)', color: '#9aa0b8' }, ticks: { color: '#9aa0b8' }, grid: { color: '#222842' } },
      },
      plugins: {
        legend: { labels: { color: '#e7e9f3' } },
        annotation: { annotations },
      },
    },
  };
  if (chart) chart.destroy();
  chart = new Chart($('chart'), cfg);
}

// --- wiring ---
$('ddBtn').addEventListener('click', () => $('ddPanel').classList.toggle('open'));
document.addEventListener('click', e => { if (!e.target.closest('.dd')) $('ddPanel').classList.remove('open'); });
['device', 'window', 'interval'].forEach(id => $(id).addEventListener('change', load));
$('reload').addEventListener('click', load);
$('base').addEventListener('change', init);
$('token').addEventListener('change', () => { localStorage.setItem('ch_token', token()); init(); });

// Bearer token: never committed in source. Resolution order:
//   ?token=...  (dev convenience: copied into localStorage, then stripped from the URL)
//   then localStorage, then manual paste (persisted on change).
function bootToken() {
  // Token (never committed): a gitignored token.local.js may set window.CH_DEV_TOKEN
  // for local dev; otherwise fall back to a previously pasted token in localStorage.
  if (window.CH_DEV_TOKEN) { $('token').value = window.CH_DEV_TOKEN; return; }
  const saved = localStorage.getItem('ch_token');
  if (saved) $('token').value = saved;
}
async function init() {
  $('err').textContent = '';
  try { await loadDevices(); } catch (e) { $('err').textContent = e.message; return; }
  await load();
}
bootToken();
init();
</script>
</body>
</html>
